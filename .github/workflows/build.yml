name: Build & Release Rust Project

on:
  workflow_dispatch:

env:
  BIN_NAME: certificate-chain-rs

permissions:
  contents: write

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build binary
        run: cargo build --release

      - name: Package binary (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/${{ env.BIN_NAME }} dist/
          tar -czvf ${{ env.BIN_NAME }}-linux.tar.gz -C dist ${{ env.BIN_NAME }}

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-linux
          path: ${{ env.BIN_NAME }}-linux.tar.gz

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and configure OpenSSL
        shell: pwsh
        run: |
          choco install openssl -y --no-progress

          $searchRoots = @(
            (Join-Path $env:ProgramFiles 'OpenSSL-Win64')
            (Join-Path $env:ProgramFiles 'OpenSSL')
            (Join-Path ${env:ProgramFiles(x86)} 'OpenSSL-Win32')
            (Join-Path $env:ChocolateyInstall 'lib')
            'C:\ProgramData\chocolatey\lib'
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique

          $opensslExe = $null
          foreach ($root in $searchRoots) {
            $opensslExe = Get-ChildItem -Path $root -Filter openssl.exe -File -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -notmatch '\\tools\\' -or $_.FullName -match 'OpenSSL' } |
              Select-Object -First 1 -ExpandProperty FullName

            if ($opensslExe) {
              break
            }
          }

          if (-not $opensslExe) {
            Write-Host 'OpenSSL search roots:'
            $searchRoots | ForEach-Object { Write-Host " - $_" }
            throw 'OpenSSL executable not found after Chocolatey installation.'
          }

          $opensslBinDir = Split-Path $opensslExe -Parent
          $opensslDirCandidates = @(
            (Split-Path $opensslBinDir -Parent)
            $opensslBinDir
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -Unique

          $opensslDir = $opensslDirCandidates |
            Where-Object {
              (Test-Path (Join-Path $_ 'include')) -and (
                (Test-Path (Join-Path $_ 'lib')) -or
                (Test-Path (Join-Path $_ 'lib\VC\x64\MD')) -or
                (Test-Path (Join-Path $_ 'lib\VC\x64\MT')) -or
                (Test-Path (Join-Path $_ 'lib\VC\static'))
              )
            } |
            Select-Object -First 1

          if (-not $opensslDir) {
            throw "OpenSSL root directory not found for executable: $opensslExe"
          }

          $libCandidates = @(
            (Join-Path $opensslDir 'lib\\VC\\x64\\MD')
            (Join-Path $opensslDir 'lib\\VC\\x64\\MT')
            (Join-Path $opensslDir 'lib\\VC\\static')
            (Join-Path $opensslDir 'lib')
          )

          $opensslLibDir = $libCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $opensslLibDir) {
            throw "OpenSSL library directory not found under $opensslDir."
          }

          Write-Host "Using OpenSSL executable: $opensslExe"
          Write-Host "Using OPENSSL_DIR: $opensslDir"
          Write-Host "Using OPENSSL_LIB_DIR: $opensslLibDir"

          "OPENSSL_DIR=$opensslDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_INCLUDE_DIR=$(Join-Path $opensslDir 'include')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_LIB_DIR=$opensslLibDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $opensslBinDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build binary
        run: cargo build --release

      - name: Package binary (zip)
        run: |
          mkdir dist
          copy target\release\${{ env.BIN_NAME }}.exe dist\
          powershell Compress-Archive -Path dist\${{ env.BIN_NAME }}.exe -DestinationPath ${{ env.BIN_NAME }}-windows.zip

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-windows
          path: ${{ env.BIN_NAME }}-windows.zip

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build binary
        run: cargo build --release

      - name: Package binary (tar.gz)
        run: |
          mkdir -p dist
          cp target/release/${{ env.BIN_NAME }} dist/
          tar -czvf ${{ env.BIN_NAME }}-macos.tar.gz -C dist ${{ env.BIN_NAME }}

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-macos
          path: ${{ env.BIN_NAME }}-macos.tar.gz

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Set release tag
        id: tag
        run: echo "tag=release-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download Linux archive
        uses: actions/download-artifact@v4
        with:
          name: archive-linux
          path: artifacts/

      - name: Download Windows archive
        uses: actions/download-artifact@v4
        with:
          name: archive-windows
          path: artifacts/

      - name: Download macOS archive
        uses: actions/download-artifact@v4
        with:
          name: archive-macos
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Certificate chain rs ${{ steps.tag.outputs.tag }}
          files: |
            artifacts/${{ env.BIN_NAME }}-linux.tar.gz
            artifacts/${{ env.BIN_NAME }}-windows.zip
            artifacts/${{ env.BIN_NAME }}-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

